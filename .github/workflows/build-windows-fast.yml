name: Build Windows Codex EXE Fast

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: codex-rs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-rs -> target

      - name: Build Codex CLI debug
        run: cargo build --bin codex

      - name: Upload codex.exe
        uses: actions/upload-artifact@v4
        with:
          name: codex-windows-exe
          path: codex-rs/target/debug/codex.exe
