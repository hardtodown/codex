name: Build Windows Codex EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build codex
        run: cargo build --release --manifest-path codex-rs/Cargo.toml --bin codex

      - name: Upload codex.exe
        uses: actions/upload-artifact@v4
        with:
          name: codex-windows-exe
          path: codex-rs/target/release/codex.exe
